x-airflow-common: &airflow-common
  image: apache/airflow:2.10.5
  entrypoint: /bin/bash
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
    AIRFLOW_UID: ${AIRFLOW_UID:-50000}
    GCP_PROJECT_ID: ${GCP_PROJECT_ID}
    GOOGLE_CLOUD_PROJECT: ${GCP_PROJECT_ID}
    RAW_BUCKET: ${RAW_BUCKET}
    BQ_DATASET: ${BQ_DATASET}
    BQ_TABLE: ${BQ_TABLE:-ist_daten_raw}
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/credentials/gcp-key.json
    INGEST_START_DATE: ${INGEST_START_DATE}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./requirements.txt:/opt/airflow/requirements.txt:ro
    - ./credentials:/opt/airflow/credentials:ro
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    command: -c "pip install --no-cache-dir -r /opt/airflow/requirements.txt && python -m airflow db migrate && python -m airflow users create --username admin --firstname admin --lastname admin --role Admin --email admin@example.com --password admin"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: -c "pip install --no-cache-dir -r /opt/airflow/requirements.txt && python -m airflow webserver"
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: -c "pip install --no-cache-dir -r /opt/airflow/requirements.txt && python -m airflow scheduler"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped
